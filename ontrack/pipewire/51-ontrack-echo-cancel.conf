# ~/.config/pipewire/pipewire.conf.d/51-ontrack-echo-cancel.conf
#
# OnTrack PipeWire DSP config:
#   1. Echo cancellation (libpipewire-module-echo-cancel)
#      Creates two virtual nodes:
#        "Echo Cancellation Source" — mic input with echo removed
#        "Echo Cancellation Sink"   — playback monitor for the AEC algorithm
#
#   2. Optional RNNoise noise suppression via filter-chain
#      (requires ladspa-rnnoise / librnnoise_ladspa.so)
#
# Install: cp this file to ~/.config/pipewire/pipewire.conf.d/
#          systemctl --user restart pipewire pipewire-pulse
#
# Verify: pw-dump | python3 -m json.tool | grep -A5 '"OnTrack'

context.modules = [

  # ── 1. Echo Cancellation ───────────────────────────────────────────────
  {
    name  = libpipewire-module-echo-cancel
    args  = {
      # Node names that appear in wpctl / pw-dump
      capture.props  = {
        node.name        = "ontrack-ec-source"
        node.description = "OnTrack Echo Cancel (mic)"
        media.class      = "Audio/Source"
        node.nick        = "OnTrack EC Mic"
      }
      playback.props = {
        node.name        = "ontrack-ec-sink"
        node.description = "OnTrack Echo Cancel (monitor)"
        media.class      = "Audio/Sink"
      }
      monitor.props  = {
        node.name        = "ontrack-ec-monitor"
        media.class      = "Stream/Output/Audio"
      }

      # AEC algorithm parameters
      # webrtc — high quality, handles music + speech
      aec.args = {
        webrtc.extended_filter  = true
        webrtc.delay_agnostic   = true
        webrtc.analog_gain_control = false
        webrtc.digital_gain_control = true
        webrtc.noise_suppression = true
        webrtc.voice_detection  = true

        # Sample rate for echo cancel processing (must match Whisper input)
        clock.rate              = 16000
        clock.allowed-rates     = [ 16000 48000 ]
      }
    }
    flags = [ ifexists nofail ]
  }

  # ── 2. RNNoise noise suppression (optional, requires ladspa-rnnoise) ───
  {
    name  = libpipewire-module-filter-chain
    args  = {
      node.name         = "ontrack-rnnoise"
      node.description  = "OnTrack Echo Cancel"

      # This is the node OnTrack will use as its mic source
      media.class       = "Audio/Source/Virtual"
      node.nick         = "OnTrack Echo Cancel"

      filter.graph = {
        nodes = [
          {
            type   = builtin
            label  = copy
            name   = passthrough
          }
          {
            type   = ladspa
            name   = rnnoise
            plugin = librnnoise_ladspa
            label  = noise_suppressor_stereo
          }
        ]
        links = [
          { output = "passthrough:Out L"  input = "rnnoise:Input L" }
          { output = "passthrough:Out R"  input = "rnnoise:Input R" }
        ]
      }

      capture.props = {
        node.name    = "ontrack-rnnoise.input"
        media.class  = "Audio/Sink"
        # Feed from echo-cancelled source
        target.object = "ontrack-ec-source"
      }
      playback.props = {
        node.name    = "ontrack-rnnoise.output"
        media.class  = "Audio/Source"
        node.nick    = "OnTrack Echo Cancel"
        node.description = "OnTrack Echo Cancel"
      }
    }
    # nofail: if ladspa-rnnoise is not installed, skip silently
    # and use the plain echo-cancel source instead
    flags = [ ifexists nofail ]
  }

]
